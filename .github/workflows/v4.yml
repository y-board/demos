name: Build and Deploy v4

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - audio_recorder
          - clock
          - color_game
          - go_cougs
          - hardware_test
          - ir
          - light_dial_game
          - light_show
          - walkie-talkie
          - wifi_sniffer
          - wireless_sound
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build merged binary
        working-directory: y-board-v4
        run: python build.py ${{ matrix.project }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.project }}
          path: y-board-v4/build/${{ matrix.project }}.bin
          if-no-files-found: error

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install --upgrade pyyaml

      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          merge-multiple: true
          path: y-board-v4/build

      - name: Checkout demo-flasher repo
        uses: actions/checkout@v4
        with:
          repository: y-board/demo-flasher
          token: ${{ secrets.FLASHER_DEPLOY_TOKEN }}
          path: demo-flasher

      - name: Generate flasher contents
        run: |
          python scripts/deploy_flasher.py \
            --demos-root y-board-v4 \
            --build-dir y-board-v4/build \
            --flasher-root demo-flasher \
            --version "$(git rev-parse --short HEAD)" \
            --template-dir flasher-template

      - name: Commit and push to demo-flasher
        working-directory: demo-flasher
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          sha=$(cd .. && git rev-parse --short HEAD)
          git commit -m "Deploy demos from y-board-demos@${sha}"
          git push
